services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edvax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edvax_password}
      POSTGRES_DB: ${POSTGRES_DB:-edvax}
    volumes:
      # NAMED VOLUME = data persists across `docker compose down`, image rebuilds,
      # and app updates. This is the guarantee that updates never wipe data.
      - edvax_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edvax}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB port NOT published to host by default — only reachable on the internal network.

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-edvax}:${POSTGRES_PASSWORD:-edvax_password}@db:5432/${POSTGRES_DB:-edvax}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      UPLOAD_DIR: /app/uploads
    volumes:
      # Uploaded course images persist here across updates/redeploys.
      - edvax_uploads:/app/uploads
    # API not published either — nginx proxies to it on the internal network.

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    # No host ports — Caddy reaches it on the internal network and terminates TLS.

  # Caddy reverse proxy: auto-provisions + renews free Let's Encrypt HTTPS for the
  # domain in DOMAIN, and proxies all traffic to the web (nginx) container.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-edvax.in}
      # Email Let's Encrypt uses for expiry/renewal notices.
      TLS_EMAIL: ${TLS_EMAIL:-edvax.info@gmail.com}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data   # stores the issued certificates (persists across updates)
      - caddy_config:/config

volumes:
  edvax_pgdata:
    # External-style named volume; survives compose down/up and rebuilds.
  edvax_uploads:
    # Uploaded course images; also survives updates/redeploys.
  caddy_data:
    # Issued TLS certificates — persist so we don't re-request on every restart.
  caddy_config:
